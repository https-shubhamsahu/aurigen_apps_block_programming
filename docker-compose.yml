# Zero-VPS option: run the whole compile backend on your own machine.
# Usage:
#   cp backend/.env.example backend/.env   # fill in Supabase values
#   docker compose up -d --build
#   docker compose logs -f                 # watch both processes
# Pair with a Cloudflare Tunnel (see README "Free hosting" section) to
# expose api:4000 to the internet with a real HTTPS URL, no port-forwarding,
# no card, no signup fee.
services:
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    volumes:
      - redis-data:/data

  api:
    build: ./backend
    command: node server.js
    restart: unless-stopped
    env_file: ./backend/.env
    environment:
      # Override .env's bare-node values — api and worker are separate
      # containers, so artifacts must live on the shared volume.
      REDIS_URL: redis://redis:6379
      ARTIFACT_DIR: /data/artifacts
      JOB_DIR: /data/jobs
    ports:
      - "4000:4000"
    depends_on:
      - redis
    volumes:
      - artifacts:/data/artifacts

  worker:
    build: ./backend
    command: node worker.js
    restart: unless-stopped
    env_file: ./backend/.env
    environment:
      REDIS_URL: redis://redis:6379
      ARTIFACT_DIR: /data/artifacts
      JOB_DIR: /data/jobs
    depends_on:
      - redis
    volumes:
      - artifacts:/data/artifacts

volumes:
  redis-data:
  artifacts:
