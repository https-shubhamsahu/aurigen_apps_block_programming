<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ccircle cx='50' cy='50' r='45' fill='%23FFD400'/%3E%3C/svg%3E" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Aurigen — Code ESP32 &amp; Arduino from your browser</title>
    <meta name="description" content="Drag blocks, watch real C++, simulate on photoreal boards — including your actual compiled firmware — and flash ESP32 or Arduino Uno over USB. No installs, no sign-up needed." />
    <meta property="og:title" content="Aurigen — Code ESP32 & Arduino from your browser" />
    <meta property="og:description" content="Block programming with real C++, a firmware-accurate simulator, and one-click USB flashing. Start building — no account needed." />
    <meta property="og:type" content="website" />
    <script>
      // Apply the saved theme before first paint — avoids a flash of the
      // wrong theme. No saved value = follow the OS (global.css handles it).
      try {
        const t = localStorage.getItem('aurigen.theme');
        if (t === 'dark' || t === 'light') document.documentElement.setAttribute('data-theme', t);
      } catch { /* localStorage unavailable (privacy mode) — OS default applies */ }
    </script>
  </head>
  <body style="margin:0">
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
